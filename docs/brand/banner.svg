<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Drum Notes — transcribe grooves at the speed of thought">
  <defs>
    <linearGradient id="bn-grad" x1="80" y1="80" x2="1180" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB020"/>
      <stop offset="1" stop-color="#FF4D2E"/>
    </linearGradient>
    <linearGradient id="bn-tile" x1="80" y1="110" x2="208" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB020"/>
      <stop offset="1" stop-color="#FF4D2E"/>
    </linearGradient>
    <radialGradient id="bn-glow" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop stop-color="#FF4D2E" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#FF4D2E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Backdrop -->
  <rect width="1280" height="360" rx="28" fill="#0B0B0F"/>
  <ellipse cx="1000" cy="180" rx="360" ry="240" fill="url(#bn-glow)"/>

  <!-- Logo mark -->
  <g transform="translate(80,110) scale(0.547)">
    <rect width="256" height="256" rx="60" fill="url(#bn-tile)"/>
    <g stroke="#fff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M66 150 v20 a62 26 0 0 0 124 0 v-20"/>
      <ellipse cx="128" cy="150" rx="62" ry="26"/>
    </g>
    <ellipse cx="128" cy="150" rx="62" ry="26" fill="#fff" fill-opacity="0.14"/>
    <g stroke="#fff" stroke-width="13" stroke-linecap="round">
      <line x1="94" y1="150" x2="152" y2="56"/>
      <line x1="162" y1="150" x2="104" y2="56"/>
    </g>
    <circle cx="152" cy="55" r="5" fill="#fff"/>
    <circle cx="104" cy="55" r="5" fill="#fff"/>
  </g>

  <!-- Wordmark -->
  <text x="260" y="178" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="78" font-weight="800" letter-spacing="-2">
    <tspan fill="#FFFFFF">Drum</tspan><tspan fill="url(#bn-grad)"> Notes</tspan>
  </text>
  <text x="262" y="226" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="500" fill="#9CA3AF">
    Transcribe grooves at the speed of thought.
  </text>

  <!-- Rhythm-grid motif (a tiny step sequencer) -->
  <g transform="translate(262,262)">
    <!-- row of 16 cells; filled ones spell a backbeat -->
    <g>
      <rect x="0"   y="0" width="34" height="34" rx="8" fill="url(#bn-grad)"/>
      <rect x="44"  y="0" width="34" height="34" rx="8" fill="#1B1B22"/>
      <rect x="88"  y="0" width="34" height="34" rx="8" fill="#1B1B22"/>
      <rect x="132" y="0" width="34" height="34" rx="8" fill="#1B1B22"/>
      <rect x="176" y="0" width="34" height="34" rx="8" fill="url(#bn-grad)"/>
      <rect x="220" y="0" width="34" height="34" rx="8" fill="#1B1B22"/>
      <rect x="264" y="0" width="34" height="34" rx="8" fill="#1B1B22"/>
      <rect x="308" y="0" width="34" height="34" rx="8" fill="#1B1B22"/>
      <rect x="352" y="0" width="34" height="34" rx="8" fill="url(#bn-grad)"/>
      <rect x="396" y="0" width="34" height="34" rx="8" fill="#1B1B22"/>
      <rect x="440" y="0" width="34" height="34" rx="8" fill="url(#bn-grad)"/>
      <rect x="484" y="0" width="34" height="34" rx="8" fill="#1B1B22"/>
    </g>
  </g>
</svg>
